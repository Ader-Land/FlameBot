<!DOCTYPE html>
<html lang="tr" data-theme="obsidian">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlameBot Chess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Custom Titlebar -->
    <div class="titlebar">
        <div class="titlebar-drag">
            <div class="titlebar-icon">♔</div>
            <span class="titlebar-title">FlameBot Chess</span>
        </div>
    </div>

    <!-- Ana İçerik -->
    <div class="app-container">
        <!-- Sol: Tahta -->
        <div class="board-section">
            <div id="board-container" class="board-container"></div>
        </div>

        <!-- Sağ: Panel -->
        <div class="side-panel">
            <!-- Sekme Başlıkları -->
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="game" id="tab-game">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2l1.5 3H13l-2.5 2 1 3L8 8.5 4.5 10l1-3L3 5h3.5L8 2z" stroke="currentColor"
                            stroke-width="1.3" fill="none" stroke-linejoin="round" />
                    </svg>
                    Oyun
                </button>
                <button class="tab-btn" data-tab="settings" id="tab-settings">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path
                            d="M6.86 2h2.28l.36 1.77.9.37 1.54-.89 1.61 1.61-.89 1.54.37.9L14.8 7.66v2.28l-1.77.36-.37.9.89 1.54-1.61 1.61-1.54-.89-.9.37L9.14 15.6H6.86l-.36-1.77-.9-.37-1.54.89-1.61-1.61.89-1.54-.37-.9L1.2 9.94V7.66l1.77-.36.37-.9-.89-1.54 1.61-1.61 1.54.89.9-.37L6.86 2z"
                            stroke="currentColor" stroke-width="1.2" />
                        <circle cx="8" cy="8.8" r="2.2" stroke="currentColor" stroke-width="1.2" />
                    </svg>
                    Ayarlar
                </button>
            </div>

            <!-- ═══ OYUN SEKMESİ ═══ -->
            <div class="tab-content active" id="tab-content-game">
                <!-- Durum + Hamle Geçmişi (Birleşik) -->
                <div class="card game-card">
                    <div class="game-header">
                        <div class="turn-indicator">
                            <div class="turn-dot white" id="turn-dot"></div>
                            <span class="turn-label" id="turn-text">Beyaz</span>
                        </div>
                        <span class="status-badge" id="status-text">Devam ediyor</span>
                    </div>
                    <div class="move-list" id="move-list"></div>
                    <div class="game-footer">
                        <span class="move-counter" id="move-count">Hamle: 0</span>
                        <span class="mode-badge" id="mode-badge">👤👤 İnsan vs İnsan</span>
                    </div>
                </div>

                <!-- Motor Durumu -->
                <div class="card engine-card">
                    <div class="engine-row">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <path
                                d="M8 2v2M8 12v2M2 8h2M12 8h2M3.75 3.75l1.42 1.42M10.83 10.83l1.42 1.42M3.75 12.25l1.42-1.42M10.83 5.17l1.42-1.42"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        </svg>
                        <span class="engine-label">Motor</span>
                        <div class="engine-status" id="engine-status">
                            <div class="dot-offline"></div>
                            <span>Bağlı değil</span>
                        </div>
                    </div>
                </div>

                <!-- Kontrol Butonları -->
                <div class="controls">
                    <button class="btn btn-primary" id="btn-new-game" title="Yeni Oyun">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <path d="M2.5 2.5v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M2.75 10A5.5 5.5 0 1 0 4.5 4.5L2.5 6.5" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Yeni
                    </button>
                    <button class="btn btn-secondary" id="btn-undo" title="Geri Al">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <path d="M5 8H2l3-3M2 8l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M3 8h6a4 4 0 0 1 0 8H7" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                        Geri
                    </button>
                    <button class="btn btn-secondary" id="btn-flip" title="Tahtayı Çevir">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <path d="M4 2l-3 3 3 3M12 8l3 3-3 3" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M1 5h11a3 3 0 0 1 0 6H4" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                        Çevir
                    </button>
                </div>
            </div>

            <!-- ═══ AYARLAR SEKMESİ ═══ -->
            <div class="tab-content" id="tab-content-settings">
                <!-- Oyun Modu -->
                <div class="card">
                    <div class="card-header">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <path d="M8 1.5a2 2 0 0 1 2 2v1a2 2 0 0 1-4 0v-1a2 2 0 0 1 2-2z" stroke="currentColor"
                                stroke-width="1.2" />
                            <path
                                d="M3.5 14s-1-3 1.5-4.5c1-.5 2-.5 3 0m0 0c1-.5 2-.5 3 0C13.5 11 12.5 14 12.5 14M8 9.5c-1.38 0-2.5.62-2.5 2S6.62 14 8 14s2.5-.62 2.5-2S9.38 9.5 8 9.5z"
                                stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                        </svg>
                        <span>Oyun Modu</span>
                    </div>
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="pvp">
                            <span class="mode-icon">👤👤</span>
                            <span class="mode-label">İnsan vs İnsan</span>
                        </button>
                        <button class="mode-btn" data-mode="pvb">
                            <span class="mode-icon">👤🤖</span>
                            <span class="mode-label">İnsan vs Bot</span>
                        </button>
                        <button class="mode-btn" data-mode="bvb">
                            <span class="mode-icon">🤖🤖</span>
                            <span class="mode-label">Bot vs Bot</span>
                        </button>
                    </div>
                </div>

                <!-- Tema -->
                <div class="card">
                    <div class="card-header">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3" />
                            <path d="M8 2.5v5.5l3.9 3.9" stroke="currentColor" stroke-width="1.3"
                                stroke-linecap="round" />
                        </svg>
                        <span>Tema</span>
                    </div>
                    <div class="theme-grid" id="theme-selector">
                        <button class="theme-chip active" data-theme="obsidian"><span class="theme-swatch"
                                style="background:linear-gradient(135deg,#6c63ff,#0a0a0f)"></span>Obsidian</button>
                        <button class="theme-chip" data-theme="emerald"><span class="theme-swatch"
                                style="background:linear-gradient(135deg,#34d399,#0b1a0f)"></span>Emerald</button>
                        <button class="theme-chip" data-theme="ocean"><span class="theme-swatch"
                                style="background:linear-gradient(135deg,#38bdf8,#070d1a)"></span>Ocean</button>
                        <button class="theme-chip" data-theme="crimson"><span class="theme-swatch"
                                style="background:linear-gradient(135deg,#f43f5e,#120808)"></span>Crimson</button>
                        <button class="theme-chip" data-theme="arctic"><span class="theme-swatch"
                                style="background:linear-gradient(135deg,#4f46e5,#f0f2f5)"></span>Arctic</button>
                        <button class="theme-chip" data-theme="neon"><span class="theme-swatch"
                                style="background:linear-gradient(135deg,#d946ef,#0a000f)"></span>Neon</button>
                    </div>
                </div>

                <!-- Geçmiş Oyunlar -->
                <div class="card history-card">
                    <div class="card-header">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <path d="M8 3v5l3 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3" />
                        </svg>
                        <span>Geçmiş Oyunlar</span>
                        <button class="btn-icon" id="btn-clear-history" title="Tüm Geçmişi Temizle">
                            <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                                <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" />
                            </svg>
                        </button>
                    </div>
                    <div class="history-list" id="history-list">
                        <div class="history-empty">Henüz kayıtlı oyun yok</div>
                    </div>
                </div>
            </div>

            <!-- ═══ YENİDEN OYNATMA BARI (oyun sekmesinde gösterilir) ═══ -->
            <div class="replay-bar hidden" id="replay-bar">
                <div class="replay-info">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M4 3l8 5-8 5V3z" fill="currentColor" />
                    </svg>
                    <span id="replay-title">Oynatılıyor...</span>
                </div>
                <div class="replay-controls">
                    <button class="btn-icon" id="replay-start" title="Başa dön">⏮</button>
                    <button class="btn-icon" id="replay-prev" title="Önceki hamle">◀</button>
                    <button class="btn-icon" id="replay-play" title="Oynat/Durdur">▶</button>
                    <button class="btn-icon" id="replay-next" title="Sonraki hamle">▶</button>
                    <button class="btn-icon" id="replay-end" title="Sona git">⏭</button>
                    <button class="btn-icon replay-exit" id="replay-exit" title="Çık">✕</button>
                </div>
                <div class="replay-progress">
                    <div class="replay-progress-bar" id="replay-progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/pieces.js"></script>
    <script src="js/game.js"></script>
    <script src="js/board.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
